    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background-color: white;

    width: 300px;
}

h1 {

    color: #333;
}

.btn {
    display: block;
    text-decoration: none;
    background-color: #4e73df;
    color: white;
    padding: 12px;
    border-radius: 8px;
    margin: 10px 0;
    transition: 0.3s ease;
    font-weight: bold;
}

.btn:hover {
    background-color: #2e59d9;
    transform: scale(1.05);
}
